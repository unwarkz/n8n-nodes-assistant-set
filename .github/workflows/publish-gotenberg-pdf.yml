name: Publish Gotenberg PDF to npm

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        working-directory: gotenberg-package
    concurrency:
        group: publish-gotenberg-pdf
        cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync dist files from package/dist
        working-directory: .
        run: |
          mkdir -p gotenberg-package/dist/nodes/gotenberg
          mkdir -p gotenberg-package/dist/credentials
          cp package/dist/nodes/gotenberg/Gotenberg.node.js       gotenberg-package/dist/nodes/gotenberg/Gotenberg.node.js
          cp package/dist/nodes/gotenberg/GotenbergAiTools.node.js gotenberg-package/dist/nodes/gotenberg/GotenbergAiTools.node.js
          cp package/dist/nodes/gotenberg/gotenberg.svg            gotenberg-package/dist/nodes/gotenberg/gotenberg.svg
          cp package/dist/credentials/GotenbergApi.credentials.js  gotenberg-package/dist/credentials/GotenbergApi.credentials.js

      - name: Validate node syntax
        working-directory: .
        run: |
          node --check gotenberg-package/dist/credentials/GotenbergApi.credentials.js
          node --check gotenberg-package/dist/nodes/gotenberg/Gotenberg.node.js
          node --check gotenberg-package/dist/nodes/gotenberg/GotenbergAiTools.node.js
          echo "✅ All files pass syntax check"

      - name: Bump version
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version ${{ github.event.inputs.version_bump }} --no-git-tag-version --prefix gotenberg-package
          git add gotenberg-package/package.json

          if git diff --cached --quiet; then
            echo "No version change to commit"
            exit 0
          fi

          git commit -m "chore: bump gotenberg-pdf version [${{ github.event.inputs.version_bump }}] [skip ci]"
          git fetch origin master
          git rebase origin/master
          git push origin HEAD:master

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
