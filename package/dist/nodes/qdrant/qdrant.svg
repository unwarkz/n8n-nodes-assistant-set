<svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="qdrantGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC244C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B9D;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Outer hexagon -->
  <polygon points="30,4 52,17 52,43 30,56 8,43 8,17" fill="url(#qdrantGrad)" />
  <!-- Inner diamond representing vector space -->
  <polygon points="30,14 44,30 30,46 16,30" fill="none" stroke="white" stroke-width="2" opacity="0.9"/>
  <!-- Center dot -->
  <circle cx="30" cy="30" r="3" fill="white" />
  <!-- Connection lines from center to diamond vertices -->
  <line x1="30" y1="30" x2="30" y2="14" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="30" y1="30" x2="44" y2="30" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="30" y1="30" x2="30" y2="46" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="30" y1="30" x2="16" y2="30" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <!-- Corner dots -->
  <circle cx="30" cy="14" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="44" cy="30" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="30" cy="46" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="16" cy="30" r="2.5" fill="white" opacity="0.9"/>
</svg>
